services:
  backend:
    build: .
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      HOST: "0.0.0.0"
      PORT: "3001"
    command: npm run backend

  app:
    build: .
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      FORMATION_IA_IN_DOCKER: "1"
    command: npm run dev:vite -- --host 0.0.0.0
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - backend
    restart: unless-stopped

volumes:
  node_modules:
